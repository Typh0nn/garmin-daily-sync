name: Garmin Morning Sync

on:
  schedule:
    #  08:00 CEST (UTC+2, lato) = 06:00 UTC
    #  Zimą (CET UTC+1) odpowiada 07:00 — wtedy brief będzie o 07:00, co jest OK
    - cron: '0 6 * * *'
  workflow_dispatch:   # możliwość ręcznego uruchomienia z GitHub UI

jobs:
  sync:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout repozytorium
        uses: actions/checkout@v4

      - name: Setup Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Instalacja zależności
        run: pip install garth gspread google-auth

      - name: Uruchom morning sync
        env:
          GARMIN_EMAIL:        ${{ secrets.GARMIN_EMAIL }}
          GARMIN_PASSWORD:     ${{ secrets.GARMIN_PASSWORD }}
          GSHEET_CREDENTIALS:  ${{ secrets.GSHEET_CREDENTIALS }}
          GSHEET_ID:           ${{ secrets.GSHEET_ID }}
        run: python garmin_sync.py --mode morning
