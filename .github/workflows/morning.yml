name: Garmin Morning Sync

on:
  schedule:
    - cron: '0 6 * * *'   # 08:00 CEST
    - cron: '0 8 * * *'   # 10:00 CEST
    - cron: '0 10 * * *'  # 12:00 CEST
  workflow_dispatch:

jobs:
  sync:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Instalacja zależności
        run: pip install garminconnect PyGithub

      - name: Morning sync
        env:
          GARMIN_EMAIL:    ${{ secrets.GARMIN_EMAIL }}
          GARMIN_PASSWORD: ${{ secrets.GARMIN_PASSWORD }}
          GITHUB_TOKEN:    ${{ secrets.GITHUB_TOKEN }}
        run: python garmin_sync.py --mode morning
