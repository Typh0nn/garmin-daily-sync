name: Garmin Morning Sync

on:
  schedule:
    - cron: '0 6 * * *'   # 08:00 CEST (UTC+2 lato) | 07:00 CET (UTC+1 zima)
  workflow_dispatch:

jobs:
  sync:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: write       # pozwala skryptowi commitować do repo

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Instalacja zależności
        run: pip install garth PyGithub

      - name: Morning sync
        env:
          GARMIN_EMAIL:      ${{ secrets.GARMIN_EMAIL }}
          GARMIN_PASSWORD:   ${{ secrets.GARMIN_PASSWORD }}
          GITHUB_TOKEN:      ${{ secrets.GITHUB_TOKEN }}   # automatyczny, nie musisz go dodawać
          # GITHUB_REPOSITORY ustawiany automatycznie przez Actions
        run: python garmin_sync.py --mode morning
