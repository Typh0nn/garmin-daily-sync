name: Garmin Activities Sync

on:
  schedule:
    - cron: '0 19 * * *'   # 21:00 CEST — po treningu/basenie
  workflow_dispatch:

jobs:
  sync:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Instalacja zależności
        run: pip install garminconnect PyGithub

      - name: Activities sync
        env:
          GARMIN_EMAIL:    ${{ secrets.GARMIN_EMAIL }}
          GARMIN_PASSWORD: ${{ secrets.GARMIN_PASSWORD }}
          GITHUB_TOKEN:    ${{ secrets.GITHUB_TOKEN }}
        run: python garmin_sync.py --mode activities
