name: Garmin Evening Sync

on:
  schedule:
    #  20:00 CEST (UTC+2, lato) = 18:00 UTC
    #  Dane pobierane 30 min przed check-inem (20:30)
    - cron: '0 18 * * *'
  workflow_dispatch:

jobs:
  sync:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout repozytorium
        uses: actions/checkout@v4

      - name: Setup Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Instalacja zależności
        run: pip install garth gspread google-auth

      - name: Uruchom evening sync
        env:
          GARMIN_EMAIL:        ${{ secrets.GARMIN_EMAIL }}
          GARMIN_PASSWORD:     ${{ secrets.GARMIN_PASSWORD }}
          GSHEET_CREDENTIALS:  ${{ secrets.GSHEET_CREDENTIALS }}
          GSHEET_ID:           ${{ secrets.GSHEET_ID }}
        run: python garmin_sync.py --mode evening
